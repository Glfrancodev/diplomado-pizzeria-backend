# ============================================================
#  Infra LOCAL para desarrollo (NO es la de AWS).
#  Levanta lo que los servicios necesitan para correr en tu PC:
#    - nats            → broker de mensajería entre los 3 servicios
#    - dynamodb-local  → DynamoDB "de mentira" en localhost:8000 (sin AWS)
#    - dynamodb-admin  → UI web para ver/editar las tablas (http://localhost:8001)
#
#  Los 3 servicios (orders, kitchen, delivery) corren en tu host con
#  `npm run start:*` (hot-reload), leyendo el archivo .env (ver .env.example).
# ============================================================

services:
  nats:
    image: nats:2.10-alpine
    container_name: nats-broker
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222" # clientes (orders/kitchen/delivery)
      - "8222:8222" # monitoreo (http://localhost:8222)

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb-local
    restart: unless-stopped
    # -sharedDb: una sola base para todas las credenciales/regiones (simple para dev).
    command: ["-jar", "DynamoDBLocal.jar", "-inMemory", "-sharedDb"]
    ports:
      - "8000:8000"

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: dynamodb-admin
    restart: unless-stopped
    environment:
      DYNAMO_ENDPOINT: http://dynamodb-local:8000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
    ports:
      - "8001:8001"
    depends_on:
      - dynamodb-local
